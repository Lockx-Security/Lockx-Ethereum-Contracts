steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lockx-proof-generator:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lockx-proof-generator:latest'
      - '.'
    dir: 'api/proof-generator'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/lockx-proof-generator']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'lockx-proof-generator'
      - '--image=gcr.io/$PROJECT_ID/lockx-proof-generator:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--memory=8Gi'
      - '--cpu=4'
      - '--timeout=60'
      - '--concurrency=10'
      - '--min-instances=1'
      - '--max-instances=100'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,USE_CLOUD_STORAGE=true,CIRCUIT_BUCKET=lockx-zk-circuits,PRELOAD_CIRCUITS=true'

# Service account for Cloud Run
options:
  logging: CLOUD_LOGGING_ONLY
  
# Timeout for the build
timeout: '1200s'